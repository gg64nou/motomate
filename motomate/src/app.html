<!doctype html>
<html lang="en" %sveltekit.attrs%>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta
			name="description"
			content="Self-hosted vehicle maintenance tracker for motorcycles and scooters."
		/>
		<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
		<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0a0a0a" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<script>
			(function () {
				var theme = localStorage.getItem('theme');
				var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				var isDark = theme === 'dark' || (theme !== 'light' && prefersDark);
				document.documentElement.style.background = isDark ? '#0a0a0a' : '#ffffff';
				if (theme === 'dark' || theme === 'light') {
					document.documentElement.dataset.theme = theme;
				} else if (prefersDark) {
					document.documentElement.dataset.theme = 'dark';
				}
			})();
		</script>
		<link
			rel="stylesheet"
			href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
			integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
			crossorigin=""
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
